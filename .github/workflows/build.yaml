name: Leaf-Installer

on:
  push:
    branches:
      - "*"
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Mark repo as safe directory
        run: git config --system --add safe.directory '*'

      # `make release` runs `make all` (the NRO) + `make payload` (the
      # hekate-BDK BPMP binary, ARMv4T via devkitARM which the devkita64
      # image ships) and then stages everything into Leaf-Installer.zip.
      - name: Build full release zip
        run: make -j"$(nproc)" release

      - name: Upload release zip
        uses: actions/upload-artifact@v7
        with:
          name: Leaf-Installer
          path: Leaf-Installer.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'

    permissions:
      contents: write

    steps:
      - name: Download release zip
        uses: actions/download-artifact@v8
        with:
          name: Leaf-Installer
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/Leaf-Installer.zip
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
